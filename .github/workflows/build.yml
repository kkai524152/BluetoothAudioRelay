name: build

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    strategy:
      matrix:
        runtime: [win-x64, win-arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore tests
        run: dotnet restore tests/BluetoothAudioRelay.Tests/BluetoothAudioRelay.Tests.csproj

      - name: Test
        if: matrix.runtime == 'win-x64'
        run: dotnet test tests/BluetoothAudioRelay.Tests/BluetoothAudioRelay.Tests.csproj --configuration Release --no-restore

      - name: Publish
        run: >-
          dotnet publish BluetoothAudioRelay.csproj
          --configuration Release
          --runtime ${{ matrix.runtime }}
          --self-contained false
          -p:PublishSingleFile=true
          -p:DebugType=None
          --output publish/${{ matrix.runtime }}

      - uses: actions/upload-artifact@v4
        with:
          name: BluetoothAudioRelay-${{ matrix.runtime }}
          path: publish/${{ matrix.runtime }}/
